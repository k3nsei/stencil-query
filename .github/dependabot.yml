version: 2
updates:
  - package-ecosystem: 'github-actions'
    directory: '/'
    target-branch: 'main'
    open-pull-requests-limit: 10
    commit-message:
      prefix: 'ci'
      include: 'scope'
    schedule:
      interval: 'weekly'
      timezone: 'Europe/Warsaw'
      day: 'monday'
      time: '09:00'

  - package-ecosystem: 'npm'
    directory: '/'
    target-branch: 'main'
    commit-message:
      prefix: 'chore'
      prefix-development: 'chore'
      include: 'scope'
    open-pull-requests-limit: 10
    schedule:
      interval: 'weekly'
      timezone: 'Europe/Warsaw'
      day: 'monday'
      time: '09:00'
    cooldown:
      default-days: 2
    groups:
      dependencies:
        applies-to: 'version-updates'
        patterns: ['*']
        exclude-patterns: ['@types/node']
      types-node:
        applies-to: 'version-updates'
        patterns: ['@types/node']
        update-types: ['minor', 'patch']
    ignore:
      - dependency-name: '@types/node'
        update-types: ['version-update:semver-major']
